<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Категории - ChainDocs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
    <style>
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1d20 0%, #0d0f11 100%); }
        .nav-link { color: rgba(255,255,255,0.7); margin-bottom: 0.25rem; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 0.375rem; }
        .nav-link i { margin-right: 0.5rem; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
        .main-content { padding: 2rem; }
        .logo { font-size: 1.25rem; font-weight: 700; color: #fff; padding: 1rem; margin-bottom: 1rem; }
        .logo i { color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
                <div class="logo"><i class="bi bi-shield-lock"></i> ChainDocs</div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/web/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="/web/blocks"><i class="bi bi-layers"></i> Блоки</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/web/categories"><i class="bi bi-folder"></i> Категории</a></li>
                    <li class="nav-item"><a class="nav-link" href="/web/upload"><i class="bi bi-cloud-upload"></i> Загрузка</a></li>
                    <li class="nav-item"><a class="nav-link" href="/web/keys"><i class="bi bi-key"></i> Ключи</a></li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 main-content" x-data="categoriesData()" x-init="loadCategories()">
                <div class="page-header pt-4">
                    <h1 class="h2"><i class="bi bi-folder"></i> Категории</h1>
                    <p class="text-muted">Управление категориями документов</p>
                </div>

                <div class="row g-4">
                    <!-- Create Category -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header"><i class="bi bi-plus-circle"></i> Создать категорию</div>
                            <div class="card-body">
                                <form @submit.prevent="createCategory">
                                    <div class="mb-3">
                                        <label class="form-label">ID *</label>
                                        <input type="text" class="form-control" x-model="newCategory.id" required 
                                               placeholder="например, diplomas">
                                        <small class="text-muted">Латиницей, без пробелов</small>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Название *</label>
                                        <input type="text" class="form-control" x-model="newCategory.name" required 
                                               placeholder="например, Дипломы студентов">
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">Описание</label>
                                        <textarea class="form-control" x-model="newCategory.description" rows="2" 
                                                  placeholder="Описание категории"></textarea>
                                    </div>
                                    <div class="alert" :class="alertClass" x-show="message" x-text="message"></div>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-plus-circle"></i> Создать
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <!-- Categories List -->
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header"><i class="bi bi-folder2-open"></i> Существующие категории</div>
                            <div class="card-body">
                                <template x-if="categories.length === 0">
                                    <p class="text-muted mb-0">Нет категорий</p>
                                </template>
                                <div class="list-group" x-show="categories.length > 0">
                                    <template x-for="cat in categories" :key="cat.id">
                                        <div class="list-group-item">
                                            <div class="d-flex justify-content-between align-items-start">
                                                <div>
                                                    <h6 class="mb-1" x-text="cat.name"></h6>
                                                    <small class="text-muted" x-text="cat.description"></small>
                                                    <div class="mt-1">
                                                        <span class="badge bg-primary" x-text="cat.doc_count + ' документов'"></span>
                                                    </div>
                                                </div>
                                                <button class="btn btn-sm btn-outline-danger" @click="deleteCategory(cat.id)">
                                                    <i class="bi bi-trash"></i>
                                                </button>
                                            </div>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
    function categoriesData() {
        return {
            categories: [],
            newCategory: { id: '', name: '', description: '' },
            message: '',
            alertClass: 'alert-info',
            async loadCategories() {
                try {
                    const res = await fetch('/api/categories');
                    const data = await res.json();
                    this.categories = data.categories || [];
                } catch (e) { console.error('Categories:', e); }
            },
            async createCategory() {
                try {
                    const res = await fetch('/api/categories', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(this.newCategory)
                    });
                    if (res.ok) {
                        this.message = 'Категория создана!';
                        this.alertClass = 'alert-success';
                        this.newCategory = { id: '', name: '', description: '' };
                        await this.loadCategories();
                    } else {
                        const err = await res.json();
                        this.message = 'Ошибка: ' + (err.message || 'Не удалось создать');
                        this.alertClass = 'alert-danger';
                    }
                } catch (e) {
                    this.message = 'Ошибка: ' + e.message;
                    this.alertClass = 'alert-danger';
                }
            },
            async deleteCategory(id) {
                if (!confirm('Удалить категорию?')) return;
                try {
                    const res = await fetch('/api/categories/' + id, { method: 'DELETE' });
                    if (res.ok) {
                        await this.loadCategories();
                    }
                } catch (e) { console.error('Delete:', e); }
            }
        }
    }
    </script>
</body>
</html>
