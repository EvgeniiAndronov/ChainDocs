<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .Title }} - ChainDocs</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
    
    <style>
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #1a1d20 0%, #0d0f11 100%);
        }
        .nav-link {
            color: rgba(255,255,255,0.7);
            margin-bottom: 0.25rem;
        }
        .nav-link:hover, .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
            border-radius: 0.375rem;
        }
        .nav-link i {
            margin-right: 0.5rem;
        }
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .stat-card {
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-2px);
        }
        .hash {
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
        }
        .hash-short {
            color: #0d6efd;
        }
        .status-badge {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.25rem;
        }
        .consensus-progress {
            height: 8px;
        }
        .table-dark {
            --bs-table-bg: transparent;
        }
        .signature-item {
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            background: rgba(0,0,0,0.2);
            border-radius: 0.25rem;
            margin-bottom: 0.25rem;
        }
        .main-content {
            padding: 2rem;
        }
        .page-header {
            margin-bottom: 2rem;
        }
        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: #fff;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .logo i {
            color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
                <div class="logo">
                    <i class="bi bi-shield-lock"></i> ChainDocs
                </div>
                <ul class="nav flex-column">
                    <li class="nav-item">
                        <a class="nav-link {{ if eq .Page "dashboard" }}active{{ end }}" href="/web/">
                            <i class="bi bi-speedometer2"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ if eq .Page "blocks" }}active{{ end }}" href="/web/blocks">
                            <i class="bi bi-layers"></i> Блоки
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ if eq .Page "upload" }}active{{ end }}" href="/web/upload">
                            <i class="bi bi-cloud-upload"></i> Загрузить
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ if eq .Page "bulk-upload" }}active{{ end }}" href="/web/bulk-upload">
                            <i class="bi bi-files"></i> Массовая загрузка
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ if eq .Page "categories" }}active{{ end }}" href="/web/categories">
                            <i class="bi bi-folder"></i> Категории
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {{ if eq .Page "keys" }}active{{ end }}" href="/web/keys">
                            <i class="bi bi-key"></i> Ключи
                        </a>
                    </li>
                </ul>
                
                <hr class="my-4" style="border-color: rgba(255,255,255,0.1)">
                
                <div class="px-3">
                    <small class="text-muted">Статус системы</small>
                    <div class="d-flex align-items-center mt-2">
                        <div class="spinner-grow spinner-grow-sm text-success me-2" role="status">
                            <span class="visually-hidden">Loading...</span>
                        </div>
                        <span class="text-success">Онлайн</span>
                    </div>
                </div>
            </nav>
            
            <!-- Main content -->
            <main class="col-md-9 ms-sm-auto col-lg-10 main-content">
                {{ template "content" . }}
            </main>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    {{ block "scripts" . }}{{ end }}
</body>
</html>
