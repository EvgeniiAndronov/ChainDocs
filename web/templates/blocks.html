<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Блоки - ChainDocs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.5/dist/cdn.min.js"></script>
    <style>
        .sidebar { min-height: 100vh; background: linear-gradient(180deg, #1a1d20 0%, #0d0f11 100%); }
        .nav-link { color: rgba(255,255,255,0.7); margin-bottom: 0.25rem; }
        .nav-link:hover, .nav-link.active { color: #fff; background: rgba(255,255,255,0.1); border-radius: 0.375rem; }
        .nav-link i { margin-right: 0.5rem; }
        .card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); }
        .hash { font-family: 'Courier New', monospace; font-size: 0.85rem; }
        .main-content { padding: 2rem; }
        .logo { font-size: 1.25rem; font-weight: 700; color: #fff; padding: 1rem; margin-bottom: 1rem; }
        .logo i { color: #0d6efd; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-3 col-lg-2 d-md-block sidebar p-3">
                <div class="logo"><i class="bi bi-shield-lock"></i> ChainDocs</div>
                <ul class="nav flex-column">
                    <li class="nav-item"><a class="nav-link" href="/web/"><i class="bi bi-speedometer2"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/web/blocks"><i class="bi bi-layers"></i> Блоки</a></li>
                    <li class="nav-item"><a class="nav-link" href="/web/categories"><i class="bi bi-folder"></i> Категории</a></li>
                    <li class="nav-item"><a class="nav-link" href="/web/upload"><i class="bi bi-cloud-upload"></i> Загрузка</a></li>
                    <li class="nav-item"><a class="nav-link" href="/web/keys"><i class="bi bi-key"></i> Ключи</a></li>
                </ul>
            </nav>

            <main class="col-md-9 ms-sm-auto col-lg-10 main-content" x-data="blocksData()" x-init="loadBlocks()">
                <div class="page-header pt-4">
                    <h1 class="h2"><i class="bi bi-layers"></i> Блоки</h1>
                    <p class="text-muted">Все блоки блокчейна</p>
                </div>

                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead>
                                    <tr>
                                        <th>Высота</th>
                                        <th>Хэш</th>
                                        <th>Документ</th>
                                        <th>Подписи</th>
                                        <th>Статус</th>
                                        <th>Время</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template x-for="block in blocks" :key="block.hash">
                                        <tr>
                                            <td x-text="block.height"></td>
                                            <td><code class="hash" x-text="block.hash.substring(0, 16) + '...'"></code></td>
                                            <td><code class="hash" x-text="block.document_hash.substring(0, 16) + '...'"></code></td>
                                            <td>
                                                <span class="badge" :class="getSignatureBadge((block.signatures?.length || 0))" x-text="(block.signatures?.length || 0) + ' подписей'"></span>
                                            </td>
                                            <td>
                                                <span class="badge" :class="getStatusBadge(block.signatures?.length || 0)" x-text="getStatusText(block.signatures?.length || 0)"></span>
                                            </td>
                                            <td x-text="formatDate(block.timestamp)"></td>
                                            <td>
                                                <a :href="'/web/block/' + block.hash" class="btn btn-sm btn-outline-primary">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
    function blocksData() {
        return {
            blocks: [],
            async loadBlocks() {
                try {
                    const res = await fetch('/api/blocks');
                    this.blocks = await res.json();
                } catch (e) { console.error('Blocks:', e); }
            },
            getSignatureBadge(count) {
                if (count >= 2) return 'bg-success';
                if (count > 0) return 'bg-warning';
                return 'bg-danger';
            },
            getStatusBadge(count) {
                if (count >= 2) return 'bg-success';
                if (count > 0) return 'bg-warning';
                return 'bg-danger';
            },
            getStatusText(count) {
                if (count >= 2) return 'Подписан';
                if (count > 0) return 'Частично';
                return 'Не подписан';
            },
            formatDate(dateStr) {
                if (!dateStr) return '—';
                return new Date(dateStr).toLocaleString('ru-RU');
            }
        }
    }
    </script>
</body>
</html>
