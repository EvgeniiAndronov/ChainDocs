{{define "content"}}
<div class="page-header pt-4">
    <div class="d-flex justify-content-between align-items-center">
        <div>
            <h1 class="h2"><i class="bi bi-layers"></i> Блоки</h1>
            <p class="text-muted">Все блоки блокчейна</p>
        </div>
        <a href="/web/upload" class="btn btn-primary">
            <i class="bi bi-cloud-upload"></i> Загрузить документ
        </a>
    </div>
</div>

<div class="card" x-data="blocksData()" x-init="loadBlocks()">
    <div class="card-header">
        <div class="d-flex justify-content-between align-items-center">
            <span><i class="bi bi-list-ul"></i> Список блоков</span>
            <span class="badge bg-secondary" x-text="'Всего: ' + blocks.length"></span>
        </div>
    </div>
    <div class="card-body p-0">
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
                <thead>
                    <tr>
                        <th>Высота</th>
                        <th>Хэш</th>
                        <th>Документ</th>
                        <th>Подписи</th>
                        <th>Консенсус</th>
                        <th>Время</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody>
                    <template x-for="block in blocks" :key="block.hash">
                        <tr>
                            <td>
                                <span class="badge bg-primary" x-text="block.height"></span>
                            </td>
                            <td>
                                <span class="hash hash-short" 
                                      :title="block.hash"
                                      x-text="block.hash.substring(0, 12) + '...'"></span>
                            </td>
                            <td>
                                <span class="hash hash-short" 
                                      :title="block.document_hash"
                                      x-text="block.document_hash.substring(0, 12) + '...'"></span>
                                <span x-show="block.height === 0" class="badge bg-secondary ms-1">Genesis</span>
                            </td>
                            <td>
                                <span class="badge" 
                                      :class="block.signatures?.length > 0 ? 'bg-success' : 'bg-secondary'"
                                      x-text="(block.signatures?.length || 0) + ' подписей'"></span>
                            </td>
                            <td style="min-width: 150px;">
                                <div class="d-flex align-items-center">
                                    <div class="progress consensus-progress flex-grow-1 me-2">
                                        <div class="progress-bar" 
                                             :class="getConsensusClass(block)"
                                             role="progressbar"
                                             :style="'width: ' + getConsensusPercent(block) + '%'"></div>
                                    </div>
                                    <small x-text="getConsensusPercent(block) + '%'"></small>
                                </div>
                            </td>
                            <td>
                                <small x-text="formatDate(block.timestamp)"></small>
                            </td>
                            <td>
                                <a :href="'/web/blocks/' + block.hash" class="btn btn-sm btn-outline-primary">
                                    <i class="bi bi-eye"></i>
                                </a>
                            </td>
                        </tr>
                    </template>
                    <tr x-show="blocks.length === 0">
                        <td colspan="7" class="text-center py-5">
                            <i class="bi bi-inbox" style="font-size: 3rem; color: rgba(255,255,255,0.3);"></i>
                            <p class="text-muted mt-3">Блоков пока нет</p>
                            <a href="/web/upload" class="btn btn-primary">
                                <i class="bi bi-cloud-upload"></i> Загрузить первый документ
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
{{end}}

{{define "scripts"}}
<script>
function blocksData() {
    return {
        blocks: [],
        totalKeys: 0,
        
        async loadBlocks() {
            try {
                const [blocksRes, keysRes] = await Promise.all([
                    fetch('/api/blocks').then(r => r.json()),
                    fetch('/api/keys').then(r => r.json())
                ]);
                
                this.blocks = blocksRes || [];
                this.totalKeys = keysRes.count || 0;
            } catch (e) {
                console.error('Failed to load blocks:', e);
            }
        },
        
        formatDate(dateStr) {
            if (!dateStr) return '';
            return new Date(dateStr).toLocaleString('ru-RU');
        },
        
        getConsensusPercent(block) {
            const sigs = block.signatures?.length || 0;
            if (this.totalKeys === 0) return 0;
            const required = Math.floor(this.totalKeys / 2) + 1;
            if (required === 0) return 0;
            return Math.min(100, Math.round(sigs / required * 100));
        },
        
        getConsensusClass(block) {
            const percent = this.getConsensusPercent(block);
            if (percent >= 100) return 'bg-success';
            if (percent >= 50) return 'bg-warning';
            return 'bg-secondary';
        }
    }
}
</script>
{{end}}
